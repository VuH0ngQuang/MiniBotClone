services:
  optibot:
    build: .
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - FILE_SEARCH_STORE_NAME=${FILE_SEARCH_STORE_NAME}
      - RUN_ONCE=${RUN_ONCE:-false}
      - RUN_HOUR=${RUN_HOUR:-00}
      - RUN_MINUTE=${RUN_MINUTE:-00}
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      - ./job.log:/app/job.log
      - optibot_data:/app/data

volumes:
  optibot_data:
